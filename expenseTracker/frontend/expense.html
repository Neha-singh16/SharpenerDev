<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="premiumSection">
      <!-- <button id="buyPremiumBtn">Buy Premium Membership</button> -->
      <div class="premium-container" id="premiumContainer">
        <div class="premium-card">
          <h2>⭐ Premium Membership</h2>

          <p>Unlock premium features</p>

          <ul>
            <li>🏆 Leaderboard</li>
            <li>📥 Download Expenses</li>
            <li>👑 Premium Badge</li>
          </ul>

          <button id="buyPremiumBtn">Buy Premium - ₹499</button>
        </div>
      </div>
    </div>
    <div class="container mt-5">
      <div class="card shadow-lg">
        <div
          class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
        >
          <h3 class="mb-0">Expense Tracker</h3>

          <button id="logoutBtn" class="btn btn-light">Logout</button>
        </div>

        <div class="card-body">
          <form id="expenseForm">
            <div class="mb-3">
              <label class="form-label"> Amount </label>

              <input
                type="number"
                id="amount"
                class="form-control"
                placeholder="Enter Amount"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label"> Description </label>

              <input
                type="text"
                id="description"
                class="form-control"
                placeholder="Enter Description"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label"> Category </label>

              <select id="category" class="form-select" required>
                <option value="">Select Category</option>

                <option value="Food">Food</option>

                <option value="Petrol">Petrol</option>

                <option value="Salary">Salary</option>

                <option value="Movie">Movie</option>

                <option value="Shopping">Shopping</option>

                <option value="Travel">Travel</option>

                <option value="Others">Others</option>
              </select>
            </div>

            <button id="submitBtn" class="btn btn-primary w-100">
              Add Expense
            </button>
          </form>

          <hr />

          <h4>Your Expenses</h4>

          <ul id="expenseList" class="list-group mt-3"></ul>
        </div>
      </div>
    </div>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="expense.js"></script>
  </body>
</html>
